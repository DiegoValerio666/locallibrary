{% extends "base_generic.html" %}

{% block content %}

<h1>Renovar: {{ bookinst.book.title }}</h1>

<p><strong>Usuario:</strong> {{ bookinst.borrower }}</p>

<p{% if bookinst.is_overdue %} class="text-danger"{% endif %}>
    <strong>Fecha actual de devolución:</strong> {{ bookinst.due_back }}
</p>

<form action="" method="post">
    {% csrf_token %}

    <table>
        {{ form.as_table }}
    </table>

    <input type="submit" value="Guardar renovación">
</form>

{% endblock %}
